<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加入全彩列印工廠官方 LINE</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #1f2937;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .qr-code {
            width: 250px;
            height: 250px;
            margin: 20px 0;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
        }

        .btn-line {
            display: block;
            background-color: #06c755;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        h2 { margin-bottom: 10px; }
        p { color: #6b7280; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>歡迎加入官方好友</h2>
        <p>掃描下方 QR Code，或點擊按鈕一鍵加入，讓我們開始您的 3D 公仔客製化之旅！</p>
        
        <img src="https://qr-official.line.me/gs/M_745ugnyl_GW.png?oat_content=qr" class="qr-code" alt="LINE QR Code">
        
        <a href="https://line.me/ti/p/BT5Y-viMB8" class="btn-line">點擊這裡加入好友</a>
    </div>

</body>
</html>
